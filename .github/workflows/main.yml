name: Build Android AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      run: |
        # البحث عن مجلد يحتوي على gradlew
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          echo "GRADLE_PATH=." >> $GITHUB_ENV
        elif [ -f "white/gradlew" ]; then
          cd white
          chmod +x gradlew
          echo "GRADLE_PATH=white" >> $GITHUB_ENV
          cd ..
        else
          echo "Error: gradlew not found"
          find . -name "gradlew"
          exit 1
        fi
    
    - name: Build AAB
      run: |
        cd ${{ env.GRADLE_PATH }}
        ./gradlew bundleRelease
        cd ..
    
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-release.aab
        path: |
          app/build/outputs/bundle/release/app-release.aab
          white/app/build/outputs/bundle/release/app-release.aab
